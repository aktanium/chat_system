<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#007bff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#28a745"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f6993f"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <text x="500" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#007bff">
    💬 Chat System Architecture
  </text>
  
  <!-- Clients -->
  <g fill="white" stroke="#007bff" stroke-width="2" filter="url(#shadow)">
    <rect x="50" y="100" width="160" height="90" rx="8"/>
    <rect x="250" y="100" width="160" height="90" rx="8"/>
    <rect x="450" y="100" width="160" height="90" rx="8"/>
  </g>
  <g font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    <text x="130" y="140" font-weight="bold" font-size="16" fill="#007bff">🌐 Web Client</text>
    <text x="130" y="165" font-size="12" fill="#666">React 18</text>
    
    <text x="330" y="140" font-weight="bold" font-size="16" fill="#007bff">📱 Mobile App</text>
    <text x="330" y="165" font-size="12" fill="#666">iOS/Android</text>
    
    <text x="530" y="140" font-weight="bold" font-size="16" fill="#007bff">💻 Desktop App</text>
    <text x="530" y="165" font-size="12" fill="#666">Electron</text>
  </g>

  <!-- Load Balancer -->
  <rect x="50" y="240" width="560" height="70" rx="8" fill="#e7f1ff" stroke="#007bff" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="275" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#007bff">⚖️ Load Balancer</text>
  <text x="330" y="295" font-family="Arial" font-size="12" text-anchor="middle" fill="#0056b3">WebSocket + HTTP Load Balancing (Nginx/HAProxy)</text>

  <!-- Chat Servers -->
  <g fill="white" stroke="#28a745" stroke-width="2" filter="url(#shadow)">
    <rect x="50" y="360" width="160" height="90" rx="8"/>
    <rect x="250" y="360" width="160" height="90" rx="8"/>
    <rect x="450" y="360" width="160" height="90" rx="8"/>
  </g>
  <g font-family="Arial" font-size="15" text-anchor="middle" fill="#28a745">
    <text x="130" y="400" font-weight="bold">🟢 Chat Server #1</text>
    <text x="130" y="420" font-size="12" fill="#666">10K conns | Node.js</text>
    
    <text x="330" y="400" font-weight="bold">🟢 Chat Server #2</text>
    <text x="330" y="420" font-size="12" fill="#666">10K conns | Node.js</text>
    
    <text x="530" y="400" font-weight="bold">🟢 Chat Server #3</text>
    <text x="530" y="420" font-size="12" fill="#666">10K conns | Node.js</text>
  </g>

  <!-- Kafka Queue -->
  <rect x="660" y="360" width="140" height="90" rx="8" fill="#fffbf0" stroke="#f6993f" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="395" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#d97706">📨 Kafka Queue</text>
  <text x="730" y="415" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Message Persistence</text>
  <text x="730" y="430" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">&amp; Delivery</text>

  <!-- Notification -->
  <rect x="830" y="360" width="140" height="90" rx="8" fill="#fff0f0" stroke="#dc3545" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="395" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#dc3545">🔔 Notification</text>
  <text x="900" y="415" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Push, Email, SMS</text>

  <!-- Auth Service -->
  <rect x="830" y="240" width="140" height="90" rx="8" fill="#f0f5ff" stroke="#007bff" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="280" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#007bff">🔐 Auth Service</text>
  <text x="900" y="300" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">OAuth2, JWT, 2FA</text>

  <!-- Monitoring -->
  <rect x="660" y="520" width="310" height="90" rx="8" fill="#fffcf5" stroke="#f6993f" stroke-width="2" filter="url(#shadow)"/>
  <text x="815" y="555" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#d97706">📊 Monitoring &amp; Logging</text>
  <text x="815" y="580" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Prometheus | Grafana | ELK Stack | Jaeger</text>

  <!-- Databases -->
  <rect x="20" y="520" width="130" height="90" rx="8" fill="#fdfdff" stroke="#6f42c1" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="555" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#6f42c1">🗄️ PostgreSQL</text>
  <text x="85" y="575" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Users &amp; Messages</text>

  <rect x="170" y="520" width="130" height="90" rx="8" fill="#fffafa" stroke="#e83e8c" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="555" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#e83e8c">⚡ Redis</text>
  <text x="235" y="575" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Cache / Presence</text>

  <rect x="320" y="520" width="130" height="90" rx="8" fill="#f0fdf4" stroke="#17a2b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="385" y="555" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#17a2b8">🔍 Elasticsearch</text>
  <text x="385" y="575" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Search Index</text>

  <rect x="470" y="520" width="130" height="90" rx="8" fill="#fffcf5" stroke="#20c997" stroke-width="2" filter="url(#shadow)"/>
  <text x="535" y="555" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#20c997">☁️ S3 Storage</text>
  <text x="535" y="575" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Media Files</text>

  <!-- Connection Lines (Arrows mapping) -->
  <g stroke-width="2" fill="none">
    <!-- Clients to Load Balancer -->
    <path d="M130 190 L130 235" stroke="#007bff" marker-end="url(#arrow)"/>
    <path d="M330 190 L330 235" stroke="#007bff" marker-end="url(#arrow)"/>
    <path d="M530 190 L530 235" stroke="#007bff" marker-end="url(#arrow)"/>
    
    <!-- Load Balancer to Chat Servers -->
    <path d="M130 310 L130 355" stroke="#28a745" marker-end="url(#arrow-green)"/>
    <path d="M330 310 L330 355" stroke="#28a745" marker-end="url(#arrow-green)"/>
    <path d="M530 310 L530 355" stroke="#28a745" marker-end="url(#arrow-green)"/>
    
    <!-- Chat Servers to DBs -->
    <path d="M100 450 L85 515" stroke="#6f42c1" marker-end="url(#arrow)"/>
    <path d="M160 450 L210 515" stroke="#e83e8c" marker-end="url(#arrow)"/>
    
    <path d="M300 450 L260 515" stroke="#e83e8c" marker-end="url(#arrow)"/>
    <path d="M360 450 L385 515" stroke="#17a2b8" marker-end="url(#arrow)"/>
    
    <path d="M500 450 L410 515" stroke="#17a2b8" marker-end="url(#arrow)"/>
    <path d="M560 450 L535 515" stroke="#20c997" marker-end="url(#arrow)"/>

    <!-- Chat Server #3 to Kafka -->
    <path d="M610 405 L655 405" stroke="#f6993f" marker-end="url(#arrow-orange)"/>

    <!-- Load Balancer to Auth Service Line -->
    <path d="M610 285 L825 285" stroke="#007bff" marker-end="url(#arrow)"/>
    
    <!-- Auth Service to Chat Server (Verification) -->
    <path d="M850 330 L580 360" stroke="#007bff" stroke-dasharray="5,5"/>

    <!-- Kafka to Notification -->
    <path d="M800 405 L825 405" stroke="#dc3545" marker-end="url(#arrow)"/>
    
    <!-- Kafka to DB (Persistence back line) -->
    <path d="M720 450 L720 480 L130 480 L110 515" stroke="#6f42c1" stroke-dasharray="4,4"/>
  </g>
</svg>