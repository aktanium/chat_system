<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- TITLE -->
  <text x="600" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#007aff">
    💬 Chat System Architecture
  </text>
  
  <!-- ===== CLIENTS LAYER ===== -->
  <!-- Web Client -->
  <rect x="50" y="80" width="150" height="100" rx="8" fill="white" stroke="#007aff" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#007aff">🌐</text>
  <text x="125" y="135" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">Web Client</text>
  <text x="125" y="160" font-size="11" text-anchor="middle" fill="#666">React 18</text>
  
  <!-- Mobile Client -->
  <rect x="230" y="80" width="150" height="100" rx="8" fill="white" stroke="#007aff" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#007aff">📱</text>
  <text x="305" y="135" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">Mobile App</text>
  <text x="305" y="160" font-size="11" text-anchor="middle" fill="#666">iOS/Android</text>
  
  <!-- Desktop Client -->
  <rect x="410" y="80" width="150" height="100" rx="8" fill="white" stroke="#007aff" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#007aff">🖥️</text>
  <text x="485" y="135" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">Desktop App</text>
  <text x="485" y="160" font-size="11" text-anchor="middle" fill="#666">Electron</text>
  
  <!-- ===== LOAD BALANCER ===== -->
  <rect x="50" y="240" width="510" height="80" rx="8" fill="#e3f2fd" stroke="#0051d5" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="270" font-size="14" font-weight="bold" text-anchor="middle" fill="#0051d5">⚖️ Load Balancer</text>
  <text x="305" y="295" font-size="11" text-anchor="middle" fill="#666">WebSocket + HTTP Load Balancing (Nginx/HAProxy)</text>
  
  <!-- Arrows from clients to LB -->
  <path d="M 125 180 L 125 240" stroke="#007aff" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
  <path d="M 305 180 L 305 240" stroke="#007aff" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
  <path d="M 485 180 L 485 240" stroke="#007aff" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
  
  <!-- ===== CHAT SERVERS LAYER ===== -->
  <!-- Server 1 -->
  <rect x="50" y="380" width="140" height="100" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="405" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981">Chat Server</text>
  <text x="120" y="425" font-size="10" text-anchor="middle" fill="#666">#1</text>
  <text x="120" y="445" font-size="10" text-anchor="middle" fill="#666">10K conns</text>
  <text x="120" y="465" font-size="10" text-anchor="middle" fill="#666">Node.js</text>
  
  <!-- Server 2 -->
  <rect x="210" y="380" width="140" height="100" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="405" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981">Chat Server</text>
  <text x="280" y="425" font-size="10" text-anchor="middle" fill="#666">#2</text>
  <text x="280" y="445" font-size="10" text-anchor="middle" fill="#666">10K conns</text>
  <text x="280" y="465" font-size="10" text-anchor="middle" fill="#666">Node.js</text>
  
  <!-- Server 3 -->
  <rect x="370" y="380" width="140" height="100" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="405" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981">Chat Server</text>
  <text x="440" y="425" font-size="10" text-anchor="middle" fill="#666">#3</text>
  <text x="440" y="445" font-size="10" text-anchor="middle" fill="#666">10K conns</text>
  <text x="440" y="465" font-size="10" text-anchor="middle" fill="#666">Node.js</text>
  
  <!-- Arrows from LB to servers -->
  <path d="M 120 320 L 120 380" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>
  <path d="M 280 320 L 280 380" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>
  <path d="M 440 320 L 440 380" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>
  
  <!-- ===== MESSAGE QUEUE ===== -->
  <rect x="570" y="380" width="140" height="100" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#f59e0b">📨 Kafka Queue</text>
  <text x="640" y="435" font-size="10" text-anchor="middle" fill="#666">Message</text>
  <text x="640" y="450" font-size="10" text-anchor="middle" fill="#666">Persistence</text>
  <text x="640" y="465" font-size="10" text-anchor="middle" fill="#666">&amp; Delivery</text>
  
  <!-- Arrow from servers to queue -->
  <path d="M 510 420 L 570 420" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowyellow)"/>
  
  <!-- ===== STORAGE LAYER ===== -->
  <!-- PostgreSQL -->
  <rect x="50" y="560" width="140" height="100" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="590" font-size="12" font-weight="bold" text-anchor="middle" fill="#8b5cf6">🗄️ PostgreSQL</text>
  <text x="120" y="615" font-size="10" text-anchor="middle" fill="#666">Users</text>
  <text x="120" y="630" font-size="10" text-anchor="middle" fill="#666">Conversations</text>
  <text x="120" y="645" font-size="10" text-anchor="middle" fill="#666">Status</text>
  
  <!-- Redis Cache -->
  <rect x="210" y="560" width="140" height="100" rx="8" fill="white" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="590" font-size="12" font-weight="bold" text-anchor="middle" fill="#ec4899">⚡ Redis</text>
  <text x="280" y="615" font-size="10" text-anchor="middle" fill="#666">Cache</text>
  <text x="280" y="630" font-size="10" text-anchor="middle" fill="#666">Presence</text>
  <text x="280" y="645" font-size="10" text-anchor="middle" fill="#666">Pub/Sub</text>
  
  <!-- Search DB -->
  <rect x="370" y="560" width="140" height="100" rx="8" fill="white" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="590" font-size="12" font-weight="bold" text-anchor="middle" fill="#06b6d4">🔍 Elasticsearch</text>
  <text x="440" y="615" font-size="10" text-anchor="middle" fill="#666">Full-text</text>
  <text x="440" y="630" font-size="10" text-anchor="middle" fill="#666">Search</text>
  <text x="440" y="645" font-size="10" text-anchor="middle" fill="#666">Index</text>
  
  <!-- Object Storage -->
  <rect x="570" y="560" width="140" height="100" rx="8" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="590" font-size="12" font-weight="bold" text-anchor="middle" fill="#14b8a6">☁️ S3 Storage</text>
  <text x="640" y="615" font-size="10" text-anchor="middle" fill="#666">Files</text>
  <text x="640" y="630" font-size="10" text-anchor="middle" fill="#666">Images</text>
  <text x="640" y="645" font-size="10" text-anchor="middle" fill="#666">Media</text>
  
  <!-- Arrows from servers to storage -->
  <path d="M 120 480 L 120 560" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowpurple)"/>
  <path d="M 280 480 L 280 560" stroke="#ec4899" stroke-width="2" fill="none" marker-end="url(#arrowpink)"/>
  <path d="M 440 480 L 440 560" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowcyan)"/>
  <path d="M 640 480 L 640 560" stroke="#14b8a6" stroke-width="2" fill="none" marker-end="url(#arrowteal)"/>
  
  <!-- ===== SERVICES LAYER ===== -->
  <!-- Notification Service -->
  <rect x="780" y="380" width="140" height="100" rx="8" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="850" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#ef4444">🔔 Notification</text>
  <text x="850" y="435" font-size="10" text-anchor="middle" fill="#666">Push</text>
  <text x="850" y="450" font-size="10" text-anchor="middle" fill="#666">Email</text>
  <text x="850" y="465" font-size="10" text-anchor="middle" fill="#666">SMS</text>
  
  <!-- Auth Service -->
  <rect x="940" y="380" width="140" height="100" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1010" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6">🔐 Auth Service</text>
  <text x="1010" y="435" font-size="10" text-anchor="middle" fill="#666">OAuth2</text>
  <text x="1010" y="450" font-size="10" text-anchor="middle" fill="#666">JWT</text>
  <text x="1010" y="465" font-size="10" text-anchor="middle" fill="#666">2FA</text>
  
  <!-- Arrows from servers to services -->
  <path d="M 510 430 L 780 430" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowred)"/>
  <path d="M 510 450 L 940 430" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowblue2)"/>
  
  <!-- ===== MONITORING & LOGGING ===== -->
  <rect x="780" y="560" width="300" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="930" y="590" font-size="12" font-weight="bold" text-anchor="middle" fill="#d97706">📊 Monitoring & Logging</text>
  <text x="930" y="615" font-size="10" text-anchor="middle" fill="#666">Prometheus | Grafana | ELK Stack | Jaeger Tracing</text>
  <text x="930" y="635" font-size="10" text-anchor="middle" fill="#666">Health Checks | Metrics | Logs | Distributed Tracing</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#007aff" />
    </marker>
    <marker id="arrowblue2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrowyellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
    <marker id="arrowpink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ec4899" />
    </marker>
    <marker id="arrowcyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#06b6d4" />
    </marker>
    <marker id="arrowteal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#14b8a6" />
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
  
  <!-- ===== LEGEND ===== -->
  <g>
    <text x="50" y="745" font-size="12" font-weight="bold" fill="#1f2937">Key Metrics:</text>
    <text x="50" y="765" font-size="11" fill="#666">• 100M DAU  • 100 concurrent users  • 1K msg/sec  • 2 sec latency SLA</text>
  </g>
  
  <!-- ===== FEATURES ===== -->
  <g>
    <text x="750" y="745" font-size="12" font-weight="bold" fill="#1f2937">Features:</text>
    <text x="750" y="765" font-size="11" fill="#666">Real-time messaging • File sharing • Search • Notifications • Presence tracking</text>
  </g>
</svg>
